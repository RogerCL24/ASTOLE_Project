<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="20%" stop-color="#D18400" stop-opacity="0"/>
      <stop offset="34%" stop-color="#FFB100" stop-opacity="0.95"/>
      <stop offset="52%" stop-color="#D18400" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D18400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- aura -->
  <circle cx="256" cy="256" r="240" fill="url(#aura)"/>

  <!-- black core sphere -->
  <circle cx="256" cy="256" r="108" fill="url(#core)"/>

  <!-- subtle accent ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="#D18400" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- inner specular highlight to give it sphere feel -->
  <ellipse cx="232" cy="218" rx="38" ry="22" fill="#FFB100" fill-opacity="0.12"/>
</svg>
