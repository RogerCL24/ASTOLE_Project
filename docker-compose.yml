services:
  agents-api:
    build:
      context: .
      dockerfile: src/agents/Dockerfile
    container_name: astole-agents-api
    ports:
      - "8010:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - RAG_API_URL=http://rag-api:8001
      - RAG_USE_MOCK=false
      - CACHE_ENABLED=false
    depends_on:
      - rag-api
    restart: unless-stopped

  rag-api:
    build:
      context: .
      dockerfile: src/agents/Dockerfile
    container_name: astole-rag-api
    command: ["uvicorn", "src.memory.rag_api:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: astole-chromadb
    ports:
      - "8002:8000"
    volumes:
      - ./src/memory/chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

networks:
  default:
    name: astole-network
