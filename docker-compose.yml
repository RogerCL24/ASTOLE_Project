services:
  agents-api:
    build:
      context: .
      dockerfile: src/agents/Dockerfile
    container_name: astole-agents-api
    ports:
      - "8010:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - RAG_API_URL=http://rag-api:8001
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - LITELLM_MOCK_RESPONSE=${LITELLM_MOCK_RESPONSE:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Use service_started (not service_healthy) so docker compose up does not
    # block waiting for rag-api's healthcheck to pass before starting
    # agents-api.  The CI workflow's own curl loop handles the real wait.
    depends_on:
      rag-api:
        condition: service_started
    restart: unless-stopped

  rag-api:
    build:
      context: .
      dockerfile: src/memory/Dockerfile
    container_name: astole-rag-api
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      # RAG_USE_MOCK=true skips MemoryManager init (no model download) so
      # uvicorn binds the port immediately and passes the healthcheck fast.
      # Override to "false" in production to enable real ChromaDB queries.
      - RAG_USE_MOCK=${RAG_USE_MOCK:-false}
    healthcheck:
      # /health returns immediately (no ChromaDB call) so this check is
      # reliable even during the sentence-transformers model-load phase.
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 6
      # Give 60 s for uvicorn to bind (model download can take ~1 min in CI
      # when RAG_USE_MOCK=false; in mock mode startup is near-instant).
      start_period: 60s
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: astole-chromadb
    ports:
      - "8002:8000"
    volumes:
      - ./src/memory/chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

networks:
  default:
    name: astole-network
