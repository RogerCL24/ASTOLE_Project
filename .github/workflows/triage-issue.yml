name: triage-issue

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage manually (must contain a JSON code block with the alert)"
        required: true

permissions:
  contents: read
  issues: write

jobs:
  triage-from-issue:
    name: Run ASTOLE triage on alert payload from issue
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'astole-triage')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: .
      RAG_USE_MOCK: "true"
      CACHE_ENABLED: "false"
      LITELLM_MOCK_RESPONSE: "true"
      OPENAI_API_KEY: "sk-test-mock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve issue number
        id: issue
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read issue body
        id: issue_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh issue view "${{ steps.issue.outputs.number }}" --json body --jq '.body')
          printf '%s' "$BODY" > /tmp/issue_body.md
          echo "Body length: $(wc -c </tmp/issue_body.md) bytes"

      - name: Extract JSON alert payload from issue body
        run: |
          python - <<'PY'
          import re, json, sys, pathlib
          body = pathlib.Path("/tmp/issue_body.md").read_text(encoding="utf-8")
          m = re.search(r"```json\s*(.+?)```", body, re.DOTALL)
          if not m:
              print("::error::No \`\`\`json fenced block found in the issue body.")
              sys.exit(1)
          payload = json.loads(m.group(1))
          pathlib.Path("/tmp/payload.json").write_text(json.dumps(payload), encoding="utf-8")
          print("Extracted payload OK.")
          PY

      - name: Run triage end-to-end (graph in-process)
        run: |
          python - <<'PY' > /tmp/triage_result.json
          import asyncio, json, pathlib
          from src.agents.graph.workflow import triage_graph
          from src.agents.models.input_schemas import InputAlert

          payload = json.loads(pathlib.Path("/tmp/payload.json").read_text())
          alert = InputAlert.model_validate(payload)
          state = {"input": alert.model_dump(mode="json", by_alias=True)}
          async def run():
              return await triage_graph.ainvoke(state)
          final = asyncio.run(run())
          print(json.dumps(final.get("triage_output") or final, indent=2, default=str))
          PY

      - name: Comment triage outcome on the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## ASTOLE Triage Result"
            echo ""
            echo "Run ID: ${{ github.run_id }} (workflow: \`${{ github.workflow }}\`)"
            echo ""
            echo "<details><summary>TriageOutput JSON</summary>"
            echo ""
            echo '```json'
            cat /tmp/triage_result.json
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/comment.md
          gh issue comment "${{ steps.issue.outputs.number }}" --body-file /tmp/comment.md

      - name: Label as triaged
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.issue.outputs.number }}" --add-label "astole-triaged" || true

      - name: Label as triage-failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.issue.outputs.number }}" --add-label "astole-triage-failed" || true
