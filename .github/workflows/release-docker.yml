name: release-docker

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (defaults to git short sha)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_AGENTS: ${{ github.repository }}/astole-agents-api
  IMAGE_RAG: ${{ github.repository }}/astole-rag-api

jobs:
  build-and-push:
    name: Build and publish Docker images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agents-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/agents/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_AGENTS }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_AGENTS }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push rag-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/agents/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_RAG }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_RAG }}:latest
          build-args: |
            DEFAULT_CMD=rag
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Released ASTOLE images"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_AGENTS }}:${{ steps.version.outputs.tag }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_RAG }}:${{ steps.version.outputs.tag }}\`"
          } >> $GITHUB_STEP_SUMMARY
