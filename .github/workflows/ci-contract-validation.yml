name: ci-contract-validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/agents/models/**"
      - "src/agents/core/**"
      - "docs/specs/CONTRACT.md"
      - "docs/samples/**"
      - ".github/workflows/ci-contract-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-contract:
    name: Validate input/output JSON contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # python-dotenv is required because src/agents/core/config.py calls
          # load_dotenv() at import time; it is pulled in when any core module
          # is imported (e.g. handoffs.py → core/__init__.py → config.py).
          # litellm is needed by the same chain (config.py imports it lazily
          # but the __init__ re-exports setup_litellm which is type-checked).
          pip install pydantic==2.* httpx fastapi uvicorn python-dotenv litellm

      - name: Validate sample alerts against InputAlert schema
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from src.agents.models.input_schemas import InputAlert

          ok, fail = 0, 0
          errors = []
          samples_dir = Path("docs/samples")
          for path in sorted(samples_dir.glob("*.json")):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  if isinstance(data, list):
                      for i, item in enumerate(data):
                          InputAlert.model_validate(item)
                          ok += 1
                  elif isinstance(data, dict) and ("alert_id" in data or "gnn_metadata" in data):
                      InputAlert.model_validate(data)
                      ok += 1
                  else:
                      print(f"[SKIP] {path.name} (not an alert sample)")
              except Exception as e:
                  fail += 1
                  errors.append(f"{path.name}: {e}")

          print(f"Validated {ok} alerts. Failures: {fail}")
          if fail:
              for err in errors:
                  print(f"  - {err}")
              raise SystemExit(1)
          PY

      - name: Validate handoff schema integrity
        shell: bash
        run: |
          python - <<'PY'
          from src.agents.core.handoffs import make_handoff, PlanStatus
          h = make_handoff(
              stage="test", from_agent="a", to_agent="b",
              task="x", scope=["y"],
              accumulated_context={"z": 1},
              attention_points=["w"],
          )
          d = h.to_dict()
          required = {"stage", "from_agent", "to_agent", "task",
                      "scope", "accumulated_context", "constraints",
                      "attention_points", "plan_status", "reason"}
          missing = required - set(d.keys())
          assert not missing, f"Missing handoff fields: {missing}"
          assert d["plan_status"] == "OK"
          assert any("existence" in c.lower() for c in d["constraints"]), \
              "Mandatory existence-validation reminder is missing in handoff."
          print("Handoff schema: OK")
          PY
