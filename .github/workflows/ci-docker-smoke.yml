name: ci-docker-smoke

on:
  push:
    branches: [main, develop]
    paths:
      - "src/agents/**"
      - "src/memory/**"
      - "docker-compose.yml"
      - "src/agents/Dockerfile"
      - "src/memory/Dockerfile"
      - ".github/workflows/ci-docker-smoke.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/agents/**"
      - "src/memory/**"
      - "docker-compose.yml"
      - "src/agents/Dockerfile"
      - "src/memory/Dockerfile"
      - ".github/workflows/ci-docker-smoke.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: Build + up + health + smoke triage
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Free disk space
        # The ubuntu-latest runner ships with ~14 GB free. Our images include
        # torch + sentence-transformers (~5 GB each), which exhausts the disk
        # during the export step. Removing unused pre-installed toolchains
        # recovers ~10 GB before the build starts.
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bring up the stack (mock RAG, mock LLM)
        env:
          RAG_USE_MOCK: "true"
          CACHE_ENABLED: "false"
          LITELLM_MOCK_RESPONSE: "true"
        run: |
          cp .env.example .env || true
          {
            echo "RAG_USE_MOCK=true"
            echo "CACHE_ENABLED=false"
            echo "LITELLM_MOCK_RESPONSE=true"
            echo "OPENAI_API_KEY=sk-test-mock"
          } >> .env
          docker compose up --build -d
          docker compose ps

      - name: Wait for agents-api healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8010/health >/dev/null; then
              echo "agents-api is healthy"
              break
            fi
            echo "Waiting for agents-api (try $i)..."
            sleep 5
          done
          curl -fsS http://localhost:8010/health

      - name: Wait for rag-api healthy
        run: |
          for i in $(seq 1 24); do
            if curl -fsS http://localhost:8001/health >/dev/null; then
              echo "rag-api is healthy"
              break
            fi
            echo "Waiting for rag-api (try $i)..."
            sleep 5
          done
          curl -fsS http://localhost:8001/health

      - name: Smoke triage (sample_alert)
        run: |
          curl -fsS -X POST http://localhost:8010/triage \
            -H "Content-Type: application/json" \
            -d @docs/samples/sample_alert.json \
            -o /tmp/triage_response.json
          echo "--- Response head ---"
          head -c 1500 /tmp/triage_response.json || true
          python -c "import json,sys;d=json.load(open('/tmp/triage_response.json'));assert d.get('triage_id'),'missing triage_id';assert 'narrative' in d,'missing narrative';print('Smoke triage: OK')"

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=400 agents-api || true
          docker compose logs --no-color --tail=200 rag-api || true
          docker compose logs --no-color --tail=100 chromadb || true

      - name: Tear down
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
